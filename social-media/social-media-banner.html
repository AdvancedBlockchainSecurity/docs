<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Blockchain Security - LinkedIn Banner</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }
        
        .banner-container {
            background: #000;
            padding: 20px;
            border-radius: 8px;
        }
        
        .banner {
            width: 1584px;
            height: 396px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #16213e 100%);
        }
        
        /* Animated gradient background */
        .banner::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(0, 229, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(138, 43, 226, 0.15) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Geometric pattern overlay */
        .pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: 
                linear-gradient(30deg, #00e5ff 12%, transparent 12.5%, transparent 87%, #00e5ff 87.5%, #00e5ff),
                linear-gradient(150deg, #00e5ff 12%, transparent 12.5%, transparent 87%, #00e5ff 87.5%, #00e5ff),
                linear-gradient(30deg, #00e5ff 12%, transparent 12.5%, transparent 87%, #00e5ff 87.5%, #00e5ff),
                linear-gradient(150deg, #00e5ff 12%, transparent 12.5%, transparent 87%, #00e5ff 87.5%, #00e5ff);
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 40px 70px, 40px 70px;
        }
        
        /* Content container - centered safe zone */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 1350px;
            max-height: 220px;
        }
        
        /* Logo/Icon */
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #00e5ff 0%, #8a2be2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 229, 255, 0.3);
            position: relative;
        }
        
        .logo::before {
            content: '';
            position: absolute;
            inset: 3px;
            background: #0a0a1a;
            border-radius: 17px;
        }
        
        .logo-icon {
            position: relative;
            z-index: 1;
            width: 50px;
            height: 50px;
        }
        
        /* Shield icon */
        .shield {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        /* Company name */
        .company-name {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #00e5ff 0%, #ffffff 50%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        
        /* Tagline */
        .tagline {
            font-size: 24px;
            color: #00e5ff;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* Subtitle */
        .subtitle {
            font-size: 18px;
            color: #a0a0a0;
            font-weight: 400;
        }
        
        /* Accent lines */
        .accent-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #00e5ff 50%, transparent 100%);
        }
        
        .accent-line.top {
            top: 60px;
            left: 0;
            right: 0;
            opacity: 0.5;
        }
        
        .accent-line.bottom {
            bottom: 60px;
            left: 0;
            right: 0;
            opacity: 0.5;
        }
        
        /* Corner decorations */
        .corner {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid #00e5ff;
            opacity: 0.3;
        }
        
        .corner.top-left {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
            border-radius: 8px 0 0 0;
        }
        
        .corner.top-right {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
            border-radius: 0 8px 0 0;
        }
        
        .corner.bottom-left {
            bottom: 20px;
            left: 20px;
            border-right: none;
            border-top: none;
            border-radius: 0 0 0 8px;
        }
        
        .corner.bottom-right {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
            border-radius: 0 0 8px 0;
        }
        
        /* Floating particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00e5ff;
            border-radius: 50%;
            opacity: 0.6;
            animation: float 8s infinite ease-in-out;
        }
        
        .particle:nth-child(1) { left: 15%; top: 25%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 85%; top: 35%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 25%; bottom: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { right: 20%; bottom: 25%; animation-delay: 6s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); opacity: 0.6; }
            50% { transform: translateY(-20px); opacity: 1; }
        }
        
        .info {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="banner-container">
        <div class="banner">
            <!-- Geometric pattern overlay -->
            <div class="pattern"></div>
            
            <!-- Corner decorations -->
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
            
            <!-- Accent lines -->
            <div class="accent-line top"></div>
            <div class="accent-line bottom"></div>
            
            <!-- Floating particles -->
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            
            <!-- Main content -->
            <div class="content">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24">
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#8a2be2;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <path class="shield" d="M12 2L4 6v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V6l-8-4z"/>
                        <path class="shield" d="M9 12l2 2 4-4" stroke-width="2.5"/>
                    </svg>
                </div>
                
                <h1 class="company-name">BlockSecOps</h1>
                <div class="tagline">Unified Smart Contract Scanning with DevSecOps Integration</div>
                <div class="subtitle">by Advanced Blockchain Security</div>
            </div>
        </div>
        
        <div class="info">
            LinkedIn Banner • 1584 x 396 pixels • Right-click and "Save As" to download
        </div>
    </div>
</body>
</html>
