    <rect width="500" height="140" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="10"/>
    <text x="250" y="25" font-size="16" font-weight="bold" text-anchor="middle" fill="#16a34a">Post-Launch Revenue Trajectory</text>

    <g transform="translate(30, 50)">
