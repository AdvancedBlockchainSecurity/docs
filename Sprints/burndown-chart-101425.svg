    <text x="240" y="25" font-size="16" font-weight="bold" text-anchor="middle" fill="#2563eb">Customer and Revenue Milestones</text>

    <g transform="translate(30, 45)">
      <circle cx="6" cy="0" r="5" fill="#16a34a"/>
