      <rect x="0" y="60" width="25" height="5" fill="#9b59b6" opacity="0.3"/>
      <text x="12" y="73" font-size="9" text-anchor="middle" fill="#333">P3</text>

      <rect x="35" y="45" width="25" height="20" fill="#27ae60" opacity="0.4"/>
      <text x="47" y="73" font-size="9" text-anchor="middle" fill="#333">M12</text>

      <rect x="70" y="20" width="25" height="45" fill="#27ae60" opacity="0.6"/>
      <text x="82" y="73" font-size="9" text-anchor="middle" fill="#333">M24</text>

      <rect x="105" y="0" width="25" height="65" fill="#16a34a" opacity="0.8"/>
      <text x="117" y="73" font-size="9" text-anchor="middle" fill="#333">M36</text>
    </g>
