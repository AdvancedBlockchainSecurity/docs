      <text x="20" y="20" font-size="11" fill="#666">37 tools operational | 0 customers (pre-launch)</text>
    </g>

    <g transform="translate(30, 125)">
      <circle cx="6" cy="0" r="5" fill="#9b59b6"/>
      <text x="20" y="5" font-size="13" font-weight="bold" fill="#333">Phase 3 End (Month 9) - Launch</text>
      <text x="20" y="20" font-size="11" fill="#9b59b6">🎯 Pilot customers begin | Production ready</text>
