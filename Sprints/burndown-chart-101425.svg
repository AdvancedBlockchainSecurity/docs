      <text x="20" y="35" font-size="11" fill="#666">• AWS Infrastructure + Kubernetes ✓</text>
      <text x="20" y="50" font-size="11" fill="#666">• Core Services (API, Data, Orchestration) ✓</text>
      <text x="20" y="65" font-size="11" fill="#666">• Tool Integration (Slither, Aderyn, Mythril) ✓</text>
      <text x="20" y="80" font-size="11" fill="#666">• Frontend Dashboard ✓</text>
      <text x="20" y="95" font-size="11" fill="#16a34a">✓ Complete: MVP operational</text>
    </g>

    <!-- Phase 2: Expansion -->
    <g transform="translate(360, 25)">
      <rect width="8" height="90" fill="#f59e0b" rx="2"/>
      <text x="20" y="15" font-size="15" font-weight="bold" fill="#f59e0b">→ Phase 2: Expansion (Weeks 1-6)</text>
      <text x="20" y="35" font-size="11" fill="#666">• Week 1-2: 5 Languages Complete ✓</text>
      <text x="20" y="50" font-size="11" fill="#f59e0b">• Week 3: Fuzzing Tools (CURRENT)</text>
      <text x="20" y="65" font-size="11" fill="#666">• Week 4-5: Additional Static Analysis</text>
      <text x="20" y="80" font-size="11" fill="#666">• Week 6: Formal Verification + Plugins</text>
      <text x="20" y="95" font-size="11" fill="#f59e0b">Target: 37 tools, industry-leading</text>
    </g>

    <!-- Phase 3: Production Ready -->
    <g transform="translate(690, 25)">
      <rect width="8" height="90" fill="#6b7280" rx="2"/>
      <text x="20" y="15" font-size="15" font-weight="bold" fill="#6b7280">○ Phase 3: Production Ready (Months 4-9)</text>
      <text x="20" y="35" font-size="11" fill="#666">• Security Hardening (TLS, Vault, NetworkPolicies)</text>
      <text x="20" y="50" font-size="11" fill="#666">• Operational Readiness (Backups, Monitoring)</text>
      <text x="20" y="65" font-size="11" fill="#666">• Load Testing + Performance Optimization</text>
      <text x="20" y="80" font-size="11" fill="#666">• Production Launch + Customer Onboarding</text>
      <text x="20" y="95" font-size="11" fill="#9b59b6">🎯 Pilot customers start at Phase 3 completion</text>
    </g>
