      <text x="200" y="25" font-size="11" fill="#666">(early adopters)</text>

      <text x="0" y="50" font-size="13" fill="#333">Month 24:</text>
      <text x="130" y="50" font-size="18" font-weight="bold" fill="#27ae60">$3M ARR</text>
      <text x="200" y="50" font-size="11" fill="#666">(market traction)</text>

      <text x="0" y="75" font-size="13" fill="#333">Month 36:</text>
      <text x="130" y="75" font-size="18" font-weight="bold" fill="#27ae60">$8M ARR</text>
      <text x="200" y="75" font-size="11" fill="#666">(target achievement)</text>
