<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <!-- Background -->
  <rect width="1400" height="1000" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="700" y="40" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Solidity Security Platform - Phase Burndown
  </text>
  <text x="700" y="70" font-size="16" text-anchor="middle" fill="#666">
    3 Phases × 9 Months | Foundation → Expansion → Production | Target: $8M ARR by Month 36
  </text>

  <!-- Main Chart Area -->
  <g transform="translate(120, 140)">
    <!-- Grid Lines -->
    <line x1="0" y1="0" x2="0" y2="450" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="450" x2="1000" y2="450" stroke="#333" stroke-width="2"/>

    <!-- Y-axis labels (Story Points Remaining) -->
    <text x="-15" y="5" text-anchor="end" font-size="13" fill="#333">280</text>
    <line x1="-5" y1="0" x2="1000" y2="0" stroke="#ddd" stroke-dasharray="5,5"/>

    <text x="-15" y="80" text-anchor="end" font-size="13" fill="#333">240</text>
    <line x1="-5" y1="75" x2="1000" y2="75" stroke="#ddd" stroke-dasharray="5,5"/>

    <text x="-15" y="155" text-anchor="end" font-size="13" fill="#333">200</text>
    <line x1="-5" y1="150" x2="1000" y2="150" stroke="#ddd" stroke-dasharray="5,5"/>

    <text x="-15" y="230" text-anchor="end" font-size="13" fill="#333">160</text>
    <line x1="-5" y1="225" x2="1000" y2="225" stroke="#ddd" stroke-dasharray="5,5"/>

    <text x="-15" y="305" text-anchor="end" font-size="13" fill="#333">120</text>
    <line x1="-5" y1="300" x2="1000" y2="300" stroke="#ddd" stroke-dasharray="5,5"/>

    <text x="-15" y="380" text-anchor="end" font-size="13" fill="#333">80</text>
    <line x1="-5" y1="375" x2="1000" y2="375" stroke="#ddd" stroke-dasharray="5,5"/>

    <text x="-15" y="455" text-anchor="end" font-size="13" fill="#333">40</text>
    <line x1="-5" y1="450" x2="1000" y2="450" stroke="#ddd" stroke-dasharray="5,5"/>

    <!-- Y-axis title -->
    <text x="-70" y="225" text-anchor="middle" font-size="15" font-weight="bold" fill="#333" transform="rotate(-90, -70, 225)">
      Story Points Remaining
    </text>

    <!-- Phase Milestone Lines -->
    <line x1="333" y1="0" x2="333" y2="450" stroke="#16a34a" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="333" y="-10" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a">Phase 1 End</text>

    <line x1="500" y1="0" x2="500" y2="450" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="500" y="-10" text-anchor="middle" font-size="11" font-weight="bold" fill="#f59e0b">Phase 2 End</text>

    <line x1="1000" y1="0" x2="1000" y2="450" stroke="#9b59b6" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="1000" y="-10" text-anchor="middle" font-size="11" font-weight="bold" fill="#9b59b6">Phase 3 End</text>

    <!-- X-axis Phase Labels -->
    <text x="167" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a">Phase 1: Foundation</text>
    <text x="167" y="490" text-anchor="middle" font-size="11" fill="#666">Infrastructure + Core Platform</text>
    <text x="167" y="505" text-anchor="middle" font-size="10" fill="#999">Months 1-3 (Complete ✓)</text>

    <text x="417" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="#f59e0b">Phase 2: Expansion</text>
    <text x="417" y="490" text-anchor="middle" font-size="11" fill="#f59e0b">37 Tools + 5 Languages</text>
    <text x="417" y="505" text-anchor="middle" font-size="10" fill="#f59e0b">Weeks 1-6 (Week 3 Current)</text>

    <text x="750" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b7280">Phase 3: Production Ready</text>
    <text x="750" y="490" text-anchor="middle" font-size="11" fill="#666">AWS Launch + Vuln Testing + Pilots</text>
    <text x="750" y="505" text-anchor="middle" font-size="10" fill="#999">Months 4-9 (Pending)</text>

    <!-- Ideal Burndown Line -->
    <line x1="0" y1="0" x2="1000" y2="450" stroke="#999" stroke-width="2" stroke-dasharray="10,5" opacity="0.5"/>
    <text x="1010" y="455" font-size="12" fill="#999">Ideal</text>

    <!-- Actual Burndown Line -->
    <polyline points="0,0 333,93 388,122 500,180 1000,450"
              fill="none" stroke="#2563eb" stroke-width="4"/>

    <!-- Current Position Marker -->
    <text x="398" y="112" text-anchor="start" font-size="12" font-weight="bold" fill="#f59e0b">← Current</text>
    <text x="398" y="127" text-anchor="start" font-size="10" fill="#6b7280">Phase 2 Week 3</text>
    <text x="398" y="140" text-anchor="start" font-size="9" fill="#999">(Oct 14, 2025)</text>

