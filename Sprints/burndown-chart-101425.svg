    <text x="333" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a">Phase 1 Complete</text>
    <text x="333" y="75" text-anchor="middle" font-size="10" fill="#6b7280">10 tools, 5 languages</text>

    <!-- Phase 3 End - Pilot Customers -->
    <text x="1000" y="420" text-anchor="end" font-size="11" font-weight="bold" fill="#9b59b6">Pilot Customers Start</text>
    <text x="1000" y="435" text-anchor="end" font-size="10" fill="#6b7280">Production Launch</text>

    <!-- Completion Markers -->
    <circle cx="0" cy="0" r="6" fill="#16a34a"/>
    <circle cx="333" cy="93" r="8" fill="#16a34a"/>
    <circle cx="388" cy="122" r="10" fill="#f59e0b"/>
    <circle cx="500" cy="180" r="6" fill="#6b7280"/>
    <circle cx="1000" cy="450" r="6" fill="#6b7280"/>

    <!-- Progress Zones -->
    <rect x="0" y="0" width="388" height="450" fill="#16a34a" opacity="0.08"/>
    <rect x="388" y="0" width="112" height="450" fill="#f59e0b" opacity="0.08"/>
    <rect x="500" y="0" width="500" height="450" fill="#6b7280" opacity="0.02"/>
