      <text x="80" y="20" font-size="12" text-anchor="middle" fill="#666">Velocity</text>
      <text x="80" y="45" font-size="24" font-weight="bold" text-anchor="middle" fill="#2563eb">82%</text>
      <text x="80" y="58" font-size="10" text-anchor="middle" fill="#666">time efficiency</text>
    </g>

    <!-- Completion Rate -->
    <g transform="translate(20, 125)">
      <rect width="160" height="60" fill="#dcfce7" rx="5"/>
      <text x="80" y="20" font-size="12" text-anchor="middle" fill="#666">Progress</text>
      <text x="80" y="45" font-size="24" font-weight="bold" text-anchor="middle" fill="#f59e0b">64%</text>
      <text x="80" y="58" font-size="10" text-anchor="middle" fill="#666">overall complete</text>
    </g>

    <!-- On Track Status -->
