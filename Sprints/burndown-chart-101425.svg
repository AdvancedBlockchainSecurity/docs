      <rect width="160" height="60" fill="#fef3c7" rx="5"/>
      <text x="80" y="20" font-size="12" text-anchor="middle" fill="#666">Status</text>
      <text x="80" y="45" font-size="16" font-weight="bold" text-anchor="middle" fill="#f59e0b">In Progress</text>
      <text x="80" y="58" font-size="10" text-anchor="middle" fill="#666">Phase 2 Week 3</text>
    </g>

    <!-- Key Deliverables -->
    <g transform="translate(20, 275)">
      <rect width="160" height="160" fill="#eff6ff" stroke="#2563eb" stroke-width="2" rx="5"/>
      <text x="80" y="20" font-size="13" font-weight="bold" text-anchor="middle" fill="#2563eb">Phase 2 Week 3</text>
      <text x="10" y="40" font-size="10" fill="#16a34a">✓ Phase 1 Complete</text>
      <text x="10" y="55" font-size="10" fill="#16a34a">✓ 5 Languages Operational</text>
      <text x="10" y="70" font-size="10" fill="#16a34a">✓ 10 Tools Integrated</text>
      <text x="10" y="85" font-size="10" fill="#16a34a">✓ Week 1-2 Complete</text>
      <text x="10" y="100" font-size="10" fill="#f59e0b">→ Fuzzing Tools (Current)</text>
      <text x="10" y="120" font-size="11" font-weight="bold" fill="#6b7280">Phase 2 Target:</text>
      <text x="10" y="135" font-size="10" fill="#666">37 tools operational</text>
      <text x="10" y="150" font-size="10" fill="#666">3-4 weeks remaining</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="700" y="985" font-size="11" text-anchor="middle" fill="#999">
    Solidity Security Platform | Phase-Based Execution → $8M ARR by Month 36 | Pilot Customers Start at Phase 3 End
  </text>
